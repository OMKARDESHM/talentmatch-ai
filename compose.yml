services:
  backend:
    build:
      context: ./backend
    environment:
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-local-docker-development-secret-key-32-bytes-minimum}
      DATABASE_URL: sqlite:////data/talentmatch.db
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      CORS_ORIGINS: http://localhost:8080
    volumes:
      - talentmatch-data:/data
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  talentmatch-data:
